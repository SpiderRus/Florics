spring:
  application:
    name: plant-shop
  web:
    resources:
      static-locations: classpath:/static/
  webflux:
    static-path-pattern: /**

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.example.webflux: DEBUG

security:
  token:
    expiration-hours: 8760
